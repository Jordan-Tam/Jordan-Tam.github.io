<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="level3.css">
    <title>Level 3</title>
</head>
<body>

    <div class="container">
        <div class="square" id="topleft"></div>
        <button class="square" id="three">III</button>
        <div class="square" id="topright"></div>
    </div>

    <div class="container">
        <button class="square" id="two">II</button>
        <span class="square" id="middle">
            <svg height="100" width="100">
            <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red"/>
            </svg>
        </span>
        <button class="square" id="four">IV</button>
    </div>

    <div class="container">
        <div class="square" id="bottomleft"></div>
        <button class="square" id="one">I</button>
        <div class="square" id="bottomright"></div>
    </div>
</body>
<script src="level3.js"></script>
</html>

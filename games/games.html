<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="games.css">
    <title>Games</title>
</head>
<body>
    
    <div class="card">
        <h2 class="card__header">Button Game</h2>
        <div class="card__div">
            <button class="card__btn card__btn--available">1</button>
            <button class="card__btn card__btn--available">2</button>
            <button class="card__btn card__btn--available">3</button>
            <button class="card__btn card__btn--available">4</button>
            <button class="card__btn card__btn--available">5</button>
        </div>
        <div class="card__div">
            <button class="card__btn card__btn--unavailable">🔒</button>
            <button class="card__btn card__btn--unavailable">🔒</button>
            <button class="card__btn card__btn--unavailable">🔒</button>
            <button class="card__btn card__btn--unavailable">🔒</button>
            <button class="card__btn card__btn--unavailable">🔒</button>
        </div>
    </div>

    <div class="card">
        <h2 class="card__header">Speed Wordle<h2>
        <button class="btn" id="speedWordlePlayButton">Play</button>
    </div>

    
    <div class="card">
        <h2 class="card__header">Tic Tac Toe</h2>
        <button class="btn" id="tttPlayButton">🔒</button>
    </div>
    
</body>
<!-- <script src="./node_modules/animejs/lib/anime.min.js"></script> -->
<script src="games.js"></script>
</html>
